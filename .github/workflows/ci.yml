name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install
        working-directory: ./my-app

      - name: Lint
        run: npm run lint
        working-directory: ./my-app

      - name: Build test
        run: npm run build
        working-directory: ./my-app